name: Fix reading recorder

on:
  push:
    branches: [main]
    paths:
      - scripts/fix-recorder.mjs
      - .github/workflows/fix-recorder.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply recorder fix
        run: node scripts/fix-recorder.mjs
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Fix reading recorder playback"
            git push
          fi
