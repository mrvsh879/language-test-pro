name: Generate Polish listening audio

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-polish-listening-audio-main
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate Polish listening bank
        run: |
          python - <<'PY'
          import json
          bank=json.load(open('data/pl-listening.json',encoding='utf-8'))
          assert bank.get('language')=='pl'
          assert bank.get('questionCount')==40
          assert len(bank.get('questions',[]))==40
          assert len({q['id'] for q in bank['questions']})==40
          assert all(q.get('transcript') for q in bank['questions'])
          print('Polish listening bank OK:',bank.get('version'))
          PY
      - name: Install dependencies
        run: pip install requests
      - name: Remove old Polish MP3 files
        run: |
          rm -rf audio/pl
          mkdir -p audio/pl
      - name: Generate Polish MP3 files
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_polish_audio.py
      - name: Validate Polish audio
        run: |
          python - <<'PY'
          import json,pathlib
          bank=json.load(open('data/pl-listening.json',encoding='utf-8'))
          expected={q['id'] for q in bank['questions']}
          files=list(pathlib.Path('audio/pl').glob('*.mp3'))
          actual={p.stem for p in files}
          assert len(files)==bank['questionCount'],(len(files),bank['questionCount'])
          assert actual==expected,(sorted(expected-actual),sorted(actual-expected))
          assert all(p.stat().st_size>1000 for p in files)
          print('Polish MP3 files OK:',len(files))
          PY
      - name: Commit Polish audio
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audio/pl
          if git diff --cached --quiet; then
            echo "No Polish audio changes to commit"
            exit 0
          fi
          git commit -m "Regenerate Polish listening audio"
          git pull --rebase origin main
          git push origin HEAD:main
