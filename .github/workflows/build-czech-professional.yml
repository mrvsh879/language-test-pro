name: Build Czech professional test

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/build_czech_professional.py'
      - 'data/cs-professional-listening-b1-c2.json'
      - 'data/cs-professional-speaking-b1-c2.json'
      - '.github/workflows/build-czech-professional.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate and build Czech banks
        run: python scripts/build_czech_professional.py
      - name: Commit professional Czech build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cs.json data/cs-listening.json data/cs-speaking.json app.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Enable professional Czech assessment"
            git push
          fi
