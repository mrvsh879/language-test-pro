name: Enable Polish modules

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/enable_polish_modules.py'

permissions:
  contents: write

concurrency:
  group: enable-polish-modules-main
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Enable Polish oral modules
        run: python scripts/enable_polish_modules.py
      - name: Validate Polish integration
        run: |
          grep -F "['cs','de','it','pl','sk','fr','ro','en'].includes(lang)" app.js
          grep -F "q.passage||q.referenceText||''" app.js
          grep -F "app.js?v=20260723-polish-oral-3" index.html
      - name: Commit app integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Enable Polish listening and speaking"
          git pull --rebase origin main
          git push origin HEAD:main
