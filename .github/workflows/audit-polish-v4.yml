name: Audit Polish v4

on:
  workflow_dispatch:
  push:
    branches: [polish-v4]
    paths:
      - 'data/pl.json'
      - 'data/pl-listening.json'
      - 'data/pl-speaking.json'
      - '.github/workflows/audit-polish-v4.yml'

permissions:
  contents: write

# Audit revision: 4.1
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run deep audit
        run: |
          python - <<'PY'
          import json, re, statistics
          from collections import Counter, defaultdict
          from pathlib import Path
          root=Path('data')
          specs={'pl.json':('main',120),'pl-listening.json':('listening',40),'pl-speaking.json':('speaking',28)}
          levels=['A1','A2','B1','B2','C1','C2']
          report={'ok':True,'errors':[],'warnings':[],'metrics':{},'samples':{}}
          seen_ids=[]
          def words(s): return re.findall(r"[A-Za-zĄĆĘŁŃÓŚŹŻąćęłńóśźż0-9]+", s or '')
          def norm(s): return ' '.join(words((s or '').lower()))
          all_texts=[]
          for fn,(kind,expected) in specs.items():
            data=json.loads((root/fn).read_text(encoding='utf-8')); qs=data.get('questions',[])
            m={'version':data.get('version'),'count':len(qs),'declared':data.get('questionCount'),'levels':dict(Counter(q.get('level') for q in qs)),'skills':dict(Counter(q.get('skill') for q in qs))}
            report['metrics'][fn]=m
            if len(qs)!=expected or data.get('questionCount')!=expected: report['ok']=False; report['errors'].append(f'{fn}: invalid count')
            if set(m['levels'])!=set(levels): report['ok']=False; report['errors'].append(f'{fn}: missing CEFR levels')
            ids=[q.get('id') for q in qs]; seen_ids+=ids
            if len(ids)!=len(set(ids)) or None in ids: report['ok']=False; report['errors'].append(f'{fn}: duplicate or missing ids')
            answer_dist=Counter(); lens=defaultdict(list); generic=0
            for q in qs:
              qid=q.get('id','?'); lvl=q.get('level')
              if kind in ('main','listening'):
                opts=q.get('options'); ans=q.get('answer')
                if not isinstance(opts,list) or len(opts)!=4 or not isinstance(ans,int) or not 0<=ans<4: report['ok']=False; report['errors'].append(f'{qid}: invalid options/answer')
                else: answer_dist[ans]+=1
                exp=q.get('explanation','')
                if exp.startswith('Poprawna odpowiedź') or len(words(exp))<6: generic+=1
              txt=(q.get('passage','') if kind=='main' and q.get('skill')=='reading' else q.get('prompt','')) if kind=='main' else (q.get('transcript','') if kind=='listening' else q.get('referenceText') or q.get('passage',''))
              if not txt: report['ok']=False; report['errors'].append(f'{qid}: missing text')
              lens[lvl].append(len(words(txt))); all_texts.append((qid,norm(txt)))
            m['answerDistribution']=dict(answer_dist); m['genericExplanations']=generic
            m['avgWordsByLevel']={k:round(statistics.mean(v),1) for k,v in lens.items() if v}
            if kind=='listening':
              for lvl,minavg in {'B2':25,'C1':35,'C2':45}.items():
                vals=lens.get(lvl,[])
                if vals and statistics.mean(vals)<minavg: report['warnings'].append(f'{fn}: {lvl} listening too short: {statistics.mean(vals):.1f}')
          if len(seen_ids)!=len(set(seen_ids)): report['ok']=False; report['errors'].append('duplicate ids across banks')
          duplicates=[]
          for i,(id1,t1) in enumerate(all_texts):
            if len(t1)<20: continue
            for id2,t2 in all_texts[i+1:]:
              if t1==t2: duplicates.append([id1,id2])
          if duplicates: report['warnings'].append(f'exact duplicate texts: {len(duplicates)}'); report['samples']['exactDuplicates']=duplicates[:20]
          report['errors']=sorted(set(report['errors'])); report['warnings']=sorted(set(report['warnings']))
          Path('validation').mkdir(exist_ok=True)
          Path('validation/pl-v4-audit.json').write_text(json.dumps(report,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(report,ensure_ascii=False,indent=2))
          if report['errors'] or report['warnings']: raise SystemExit(1)
          PY
      - name: Commit audit report
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add validation/pl-v4-audit.json
          git diff --cached --quiet || git commit -m "Update Polish v4 audit report"
          git pull --rebase origin polish-v4
          git push origin HEAD:polish-v4
