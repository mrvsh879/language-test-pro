name: Build German professional test

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/build_german_professional.py'
      - 'data/de-professional-*.json'
      - 'data/de-listening*.json'
      - 'data/de-speaking*.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate and build German banks
        run: python scripts/build_german_professional.py
      - name: Commit professional German build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/de.json data/de-listening.json data/de-speaking.json app.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Enable professional German assessment"
            git push
          fi
