name: Enable worker languages

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/enable-worker-languages.mjs'
      - '.github/workflows/enable-worker-languages.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/enable-worker-languages.mjs
      - name: Commit worker update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloudflare/worker.js
          git diff --cached --quiet || git commit -m "Support German reading analysis"
          git push
