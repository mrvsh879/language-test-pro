name: Build Polish professional test

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/install_polish_professional.py'
      - '.github/workflows/build-polish-professional.yml'

permissions:
  contents: write

concurrency:
  group: build-polish-professional-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build Polish banks
        run: python scripts/install_polish_professional.py
      - name: Validate Polish banks
        run: |
          python - <<'PY'
          import json
          expected={'pl.json':120,'pl-listening.json':40,'pl-speaking.json':28}
          levels={'A1','A2','B1','B2','C1','C2'}
          for name,count in expected.items():
              data=json.load(open('data/'+name,encoding='utf-8'))
              assert data.get('questionCount')==count,(name,data.get('questionCount'))
              assert len(data['questions'])==count,(name,len(data['questions']))
              assert set(q['level'] for q in data['questions'])==levels,(name,'missing levels')
              assert len({q['id'] for q in data['questions']})==count,(name,'duplicate ids')
              assert data.get('version')=='4.0.0-professional',(name,data.get('version'))
              print(name,data.get('version'),count,'OK')
          PY
      - name: Commit Polish banks
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/pl.json data/pl-listening.json data/pl-speaking.json
          if git diff --cached --quiet; then
            echo "No bank changes to commit"
            exit 0
          fi
          git commit -m "Build Polish professional test v4"
          git pull --rebase origin main
          git push origin HEAD:main
