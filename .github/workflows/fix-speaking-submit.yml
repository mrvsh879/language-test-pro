name: Fix speaking submit

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/fix-speaking-submit.mjs'
      - '.github/workflows/fix-speaking-submit.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fix-speaking-submit.mjs
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js
          git diff --cached --quiet || git commit -m "Fix speaking AI submission"
          git push
