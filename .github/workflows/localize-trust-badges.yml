name: Localize trust badges

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/localize-trust-badges.py

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/localize-trust-badges.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app.js
          git diff --cached --quiet || git commit -m "Localize start page badges"
          git push
