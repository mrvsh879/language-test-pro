name: Fix adaptive route

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/fix_adaptive_route.py'
      - '.github/workflows/fix-adaptive-route.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fix route and simplify wording
        run: python scripts/fix_adaptive_route.py
      - name: Commit corrected test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js data
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Fix adaptive route and simplify advanced wording"
            git push
          fi
