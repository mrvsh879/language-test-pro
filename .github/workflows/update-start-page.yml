name: Update start page

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/update-start-page.py'
      - '.github/workflows/update-start-page.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply start page changes
        run: python scripts/update-start-page.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app.js styles.css
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update start page content"
            git push
          fi
